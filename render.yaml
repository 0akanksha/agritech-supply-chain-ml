# One Render service, applied once as a Blueprint (New -> Blueprint, point at this repo, and
# make sure it's actually the Blueprint flow — "New -> Web Service" auto-detects an environment
# instead of reading this file, which is what broke the original two-service attempt). autoDeploy
# is disabled on purpose — deploys are triggered by GitHub Actions
# (.github/workflows/ci-deploy.yml) only after CI passes on main, via this service's Deploy Hook
# (Settings tab once it exists), not on every push. See README's "Deploying" section for the
# one-time manual setup this Blueprint doesn't cover (env var values, deploy hook -> GitHub
# secret).
services:
  - type: web
    name: agritech
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    autoDeploy: false
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false # Neon connection string — paste manually, never commit it
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATA_GOV_IN_API_KEY
        sync: false # optional — real mandi prices stay off, placeholder data used, until set
      - key: MLFLOW_TRACKING_URI
        value: file:./mlruns # ephemeral on the free tier — see ml-service/.env.example
      # Tells server/src/index.ts to spawn the Python ML service itself as a child process
      # (server/src/lib/embeddedMlService.ts) instead of expecting it as a separate service —
      # never set this locally, npm run dev already runs it as its own process.
      - key: EMBEDDED_ML_SERVICE
        value: "true"
      # NODE_ENV intentionally omitted here as a platform env var — it's set to production
      # only in server/package.json's own start script; setting it platform-wide makes
      # Render's install skip devDependencies and breaks the build.
