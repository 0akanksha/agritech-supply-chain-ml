name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npx tsc -b
      - run: npx oxlint

  server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json
      # server/src/index.ts resolves vite/@vitejs/plugin-react/@tailwindcss/vite from the
      # ROOT node_modules by design (Node's module resolution walks up parent directories —
      # see Phase 2), so the root install has to happen here too, not just server's.
      - run: npm install
      - run: npm install --prefix server
      - run: npm run build --prefix server

  ml-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: ml-service/requirements.txt
      - run: pip install -r ml-service/requirements.txt
      - run: cd ml-service && python -m pytest tests/ -q

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f Dockerfile .
        # Sanity check only — confirms the image Render will build from actually builds.
        # Doesn't push anywhere; Render builds its own copy from the same Dockerfile on deploy
        # (autoDeploy: true in render.yaml — Render deploys directly on push, not gated on
        # these checks passing here. See render.yaml's comment for how to restore that gate.)
