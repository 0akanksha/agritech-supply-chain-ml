name: CI and deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npx tsc -b
      - run: npx oxlint

  server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm install --prefix server
      - run: npm run build --prefix server

  ml-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: ml-service/requirements.txt
      - run: pip install -r ml-service/requirements.txt
      - run: cd ml-service && python -m pytest tests/ -q

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f ml-service/Dockerfile ml-service
        # Sanity check only — confirms the image Render will build from actually builds.
        # Doesn't push anywhere; Render builds its own copy from the same Dockerfile on deploy.

  # Deploys only run for pushes to main, and only after every check above passes. Both Render
  # services have autoDeploy disabled (see render.yaml) specifically so this job is what
  # controls when a deploy actually happens, not "any push to the connected branch."
  deploy:
    needs: [frontend, server, ml-service, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy agritech-web
        run: curl -fsS "${{ secrets.RENDER_DEPLOY_HOOK_WEB }}"
      - name: Deploy agritech-ml
        run: curl -fsS "${{ secrets.RENDER_DEPLOY_HOOK_ML }}"
